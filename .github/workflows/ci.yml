name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Manual trigger for redeploys. Note: deploy-pages@v5 cannot recover via
  # "re-run failed jobs" (duplicate github-pages artifacts) — dispatch a fresh run instead.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Cache SCF workbook
        uses: actions/cache@v6.1.0
        with:
          path: .scf-cache
          key: scf-workbook-2026.1.1
      - name: Fetch official SCF workbook and generate test fixture
        # The SCF is CC BY-ND 4.0, so no SCF content (not even a trimmed slice)
        # lives in this repo. Tests fetch the unmodified official release from
        # the SCF Council's own GitHub and derive the fixture at test time.
        run: |
          mkdir -p .scf-cache
          [ -f .scf-cache/scf.xlsx ] || curl -sSL --retry 3 -o .scf-cache/scf.xlsx \
            "https://github.com/securecontrolsframework/securecontrolsframework/releases/download/2026.1.1/Secure.Controls.Framework.SCF.-.2026.1.1.xlsx"
          echo "ef13a69f58e3290168b0d582330b87d22d4ee39e846ec64c3d4e98e7886c312e  .scf-cache/scf.xlsx" | sha256sum -c -
          SCF_XLSX=.scf-cache/scf.xlsx node scripts/make-fixture.mjs
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: E2E (fixture)
        run: |
          npx playwright install --with-deps chromium
          npx playwright test e2e/fixture.spec.ts e2e/scope.spec.ts e2e/landing.spec.ts
        if: hashFiles('e2e/fixture.spec.ts') != ''

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          GITHUB_PAGES: 'true'
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v5
